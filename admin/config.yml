backend:
  name: github
  repo: Lov2jk/Lov2JK
  branch: main
  base_url: https://YOUR-OAUTH-PROXY.example.com
  auth_endpoint: auth
media_folder: "assets/images/products"
public_folder: "/assets/images/products"
site_url: https://shop.lov2jk.in
display_url: https://shop.lov2jk.in
logo_url: https://shop.lov2jk.in/assets/images/lov2jk-logo.webp
collections:
  - name: catalog
    label: Product catalog
    files:
      - name: products
        label: Products
        file: content/products.json
        fields:
          - label: Products
            name: products
            widget: list
            summary: "{{fields.name}} — ₹{{fields.offerPrice}}"
            fields:
              - {label: Product name, name: name, widget: string}
              - {label: URL slug, name: slug, widget: string, hint: "Lowercase words joined with hyphens"}
              - {label: Description, name: description, widget: text}
              - {label: Regular price, name: price, widget: number, value_type: int}
              - {label: Offer price, name: offerPrice, widget: number, value_type: int, required: false}
              - {label: SKU, name: sku, widget: string}
              - {label: Stock quantity, name: stock, widget: number, value_type: int, min: 0}
              - {label: Category, name: category, widget: select, options: [Dresses, Toys]}
              - {label: Colors, name: colors, widget: list, field: {label: Color, name: color, widget: string}}
              - {label: Sizes, name: sizes, widget: list, required: false, field: {label: Size, name: size, widget: string}}
              - {label: Age group, name: ageGroup, widget: string}
              - {label: Product images, name: images, widget: list, required: false, field: {label: Image, name: image, widget: image}}
              - {label: Featured on homepage, name: featured, widget: boolean, default: false}
              - {label: Available to order, name: available, widget: boolean, default: true}
  - name: settings
    label: Store settings
    files:
      - name: store
        label: Contact, payment & social links
        file: content/settings.json
        fields:
          - {label: Store name, name: storeName, widget: string}
          - {label: Tagline, name: tagline, widget: string}
          - {label: WhatsApp number, name: whatsapp, widget: string, hint: "Country code + number, digits only"}
          - {label: Email, name: email, widget: string}
          - {label: UPI ID, name: upiId, widget: string}
          - {label: Payment link, name: paymentLink, widget: string, required: false}
          - {label: Shipping banner, name: shippingNote, widget: string}
          - {label: Instagram URL, name: instagram, widget: string}
          - {label: Facebook URL, name: facebook, widget: string}
          - {label: YouTube URL, name: youtube, widget: string}
          - label: Public business details
            name: business
            widget: object
            fields:
              - {label: Trademark name, name: trademarkName, widget: string}
              - {label: Proprietor name, name: proprietorName, widget: string}
              - {label: Company name, name: companyName, widget: string}
              - {label: Business address, name: address, widget: text}
              - {label: Business commencement date, name: commencementDate, widget: string}
              - {label: Nature of business, name: nature, widget: string}
          - label: Online marketplaces
            name: marketplaces
            widget: list
            summary: "{{fields.name}}"
            hint: "Add Amazon, Flipkart, Meesho or any future public store link here. Leave a URL empty until the official page is ready."
            fields:
              - {label: Marketplace name, name: name, widget: string, hint: "Example: Amazon.in"}
              - {label: Public store or product URL, name: url, widget: string, required: false}
              - {label: Short note, name: note, widget: string, required: false}
