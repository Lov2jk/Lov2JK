media:
  input: assets/images/products
  output: assets/images/products

content:
  - name: catalog
    label: Product catalog
    type: file
    path: content/products.json
    format: json
    operations:
      delete: false
    fields:
      - name: products
        label: Products
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{name} — {sku}"
        fields:
          - name: name
            label: Product name
            type: string
            required: true
          - name: slug
            label: URL slug
            type: string
            required: true
            description: Lowercase words joined with hyphens, for example pink-party-dress.
            pattern:
              regex: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
              message: Use lowercase letters, numbers and hyphens only.
          - name: description
            label: Description
            type: text
            required: true
          - name: price
            label: Regular price
            type: number
            required: true
          - name: offerPrice
            label: Offer price
            type: number
          - name: sku
            label: SKU
            type: string
            required: true
          - name: stock
            label: Stock quantity
            type: number
            required: true
          - name: category
            label: Category
            type: select
            required: true
            options:
              values: [Dresses, Toys]
          - name: colors
            label: Colours
            type: string
            list: true
          - name: sizes
            label: Sizes
            type: string
            list: true
          - name: ageGroup
            label: Age group
            type: string
          - name: images
            label: Product images
            type: image
            list: true
            description: The first image is the catalog cover. JPG, PNG, WebP and animated GIF images are supported.
          - name: imageFit
            label: Product image display
            type: select
            options:
              values: [cover, contain]
            description: Cover automatically fills and crops the frame. Contain shows the complete image without cropping.
          - name: imagePosition
            label: Product image crop position
            type: select
            options:
              values: [center, top, bottom, left, right]
            description: Choose which part of the image remains visible when Cover is selected.
          - {name: slideshowEnabled, label: Automatically move product images, type: boolean, default: true}
          - name: slideSeconds
            label: Seconds between product images
            type: number
            default: 4
            description: Recommended value is 4. This is used when the product has more than one image.
          - name: videoUrl
            label: Product video URL
            type: string
            description: Optional. Paste a YouTube link or a direct public MP4/WebM video URL.
          - name: videoPoster
            label: Product video cover image
            type: image
            description: Optional preview image shown before a direct video starts.
          - {name: material, label: Material or product details, type: text}
          - {name: care, label: Care or safety instructions, type: text}
          - name: sizeGuide
            label: Size guide
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{size}"
            description: Optional for dresses. Add the actual garment measurements for each available size.
            fields:
              - {name: size, label: Size, type: string, required: true}
              - {name: chest, label: Chest, type: string}
              - {name: waist, label: Waist, type: string}
              - {name: length, label: Length, type: string}
          - name: reviews
            label: Customer reviews
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{name} — {rating}/5"
            description: Add only genuine customer reviews with permission.
            fields:
              - {name: name, label: Customer name, type: string, required: true}
              - {name: rating, label: Rating out of 5, type: number, required: true}
              - {name: text, label: Review, type: text, required: true}
              - {name: verified, label: Verified purchase, type: boolean}
          - name: featured
            label: Show on homepage
            type: boolean
          - name: available
            label: Available to order
            type: boolean

  - name: store
    label: Store settings
    type: file
    path: content/settings.json
    format: json
    operations:
      delete: false
    fields:
      - {name: storeName, label: Store name, type: string, required: true}
      - {name: tagline, label: Tagline, type: string}
      - name: siteUrl
        label: Public website URL
        type: string
        description: Keep the GitHub Pages URL until your custom domain is connected.
      - {name: heroEyebrow, label: Homepage small heading, type: string}
      - {name: heroTitle, label: Homepage main heading, type: string}
      - {name: heroDescription, label: Homepage introduction, type: text}
      - {name: heroVisualEnabled, label: Show homepage hero visual, type: boolean}
      - name: heroImage
        label: Homepage hero fallback image
        type: image
        description: Used only when the slideshow image list below is empty. JPG, PNG, WebP and animated GIF are supported.
      - name: heroImages
        label: Homepage hero slideshow images
        type: image
        list: true
        description: Add, remove and reorder images here. They move automatically from right to left.
      - {name: heroSlideshowEnabled, label: Automatically move homepage images, type: boolean, default: true}
      - name: heroSlideSeconds
        label: Seconds between homepage images
        type: number
        default: 4
        description: Recommended value is 4.
      - {name: heroImageAlt, label: Hero image description, type: string}
      - name: heroImagePosition
        label: Hero image position
        type: select
        options:
          values: [center, top, bottom, left, right]
      - {name: heroCardEnabled, label: Show favourite card on hero image, type: boolean}
      - {name: heroCardEyebrow, label: Favourite card small heading, type: string}
      - {name: heroCardTitle, label: Favourite card title, type: string}
      - {name: heroCardText, label: Favourite card description, type: string}
      - name: dressesCategoryImage
        label: Dresses category image
        type: image
        description: Optional homepage category image. Remove it to use the colourful background.
      - {name: dressesCategoryEyebrow, label: Dresses category small heading, type: string}
      - {name: dressesCategoryTitle, label: Dresses category title, type: string}
      - name: toysCategoryImage
        label: Toys category image
        type: image
        description: Optional homepage category image. Remove it to use the colourful background.
      - {name: toysCategoryEyebrow, label: Toys category small heading, type: string}
      - {name: toysCategoryTitle, label: Toys category title, type: string}
      - name: whatsapp
        label: WhatsApp number
        type: string
        description: Country code and number using digits only, for example 919363529266.
      - {name: email, label: Business email, type: string}
      - {name: upiId, label: UPI ID, type: string}
      - {name: paymentLink, label: Payment link, type: string}
      - {name: shippingNote, label: Top announcement, type: string}
      - {name: dispatchTime, label: Dispatch estimate, type: string}
      - {name: deliveryEstimate, label: Delivery estimate, type: string}
      - name: analyticsMeasurementId
        label: Google Analytics measurement ID
        type: string
        description: Optional. Paste an ID such as G-ABC123 after creating Google Analytics.
      - {name: instagram, label: Instagram URL, type: string}
      - {name: facebook, label: Facebook URL, type: string}
      - {name: youtube, label: YouTube URL, type: string}
      - name: business
        label: Public business details
        type: object
        fields:
          - {name: trademarkName, label: Trademark name, type: string}
          - {name: proprietorName, label: Proprietor name, type: string}
          - {name: companyName, label: Company name, type: string}
          - {name: address, label: Business address, type: text}
          - {name: commencementDate, label: Business commencement date, type: string}
          - {name: nature, label: Nature of business, type: string}
      - name: marketplaces
        label: Online marketplaces
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{name}"
        fields:
          - {name: name, label: Marketplace name, type: string, required: true}
          - name: url
            label: Public store or product URL
            type: string
            description: Paste the customer-facing Amazon, Flipkart or other store link.
          - {name: note, label: Short note, type: string}
      - name: promotion
        label: Advertisement popup
        type: object
        description: This popup appears once per browser session. Turn it off when no campaign is running.
        fields:
          - {name: enabled, label: Show advertisement popup, type: boolean}
          - {name: eyebrow, label: Small heading, type: string}
          - {name: title, label: Main offer heading, type: string}
          - {name: text, label: Offer or collection message, type: text}
          - {name: image, label: Advertisement image, type: image}
          - name: videoUrl
            label: Advertisement video URL
            type: string
            description: Optional. Paste a YouTube link or direct public MP4/WebM URL. Video replaces the advertisement image when provided.
          - {name: videoPoster, label: Video cover image, type: image}
          - {name: videoAutoplay, label: Autoplay video, type: boolean}
          - {name: videoMuted, label: Mute video, type: boolean}
          - {name: videoControls, label: Show video controls, type: boolean}
          - {name: buttonLabel, label: Button text, type: string}
          - name: buttonUrl
            label: Button destination
            type: string
            description: Use shop.html for the shop, a product URL, WhatsApp link or another public page.

settings:
  content:
    merge: true
  commit:
    identity: user
    templates:
      update: "Update Lov2JK content: {path}"
